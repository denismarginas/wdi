<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concurs Bere - Participare</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #1b2f28;
            color: #333;
            position: relative;
            overflow-x: hidden;
        }

        .img-overlay {
            position: fixed;
            z-index: 0;
            object-fit: cover;
            width: 100%;
            height: 100%;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
        }

        .content-over {
            z-index: 1;
            position: relative;
        }

        h2 {
            color: #ececec;
            text-align: center;
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 10px;
            background-color: #455e46;
            padding: 6px 12px;
            border-radius: 14px;
            font-size: 18px;
            line-height: 22px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .runda {
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(51, 99, 71, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        #rezultate-container {
            background: rgba(51, 99, 71, 0.945);
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 20px;
            border-radius: 15px;
            color: #fff;
            padding: 12px 14px;
        }

        #rezultate-container h2,
        #rezultate-container h3,
        #rezultate-container span {
            color: #fff;
        }

        .runda label {
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
            font-size: 16px;
            line-height: 22px;
            font-weight: 600;
            color: #ffffff;
        }

        .runda .radio-wrapper {
            font-size: 14px;
            line-height: 20px;
            font-weight: 400;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
        }

        .option-item {
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            font-size: 14px;
            cursor: pointer;
            text-align: center;
        }

        .option-item:has(input:checked) {
            background-color: #236432;
            border-color: #28a745;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            color: #fff !important;
        }

        .option-item:hover {
            background-color: #e2e2e2;
        }

        .option-item input {
            margin-right: 8px;
            display: none;
        }

        .error {
            color: #721c24;
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
        }

        #nume {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        button {
            width: 100%;
            background: #4CAF50;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            transition: background 0.3s;
        }

        button:hover {
            background: #45a049;
        }

        hr {
            border: 0;
            border-top: 1px solid #eee;
            margin: 20px 0;
        }

        .formular-raspuns {
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-top: 20px;
            font-weight: bold;
        }

        .succes {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .eroare-mesaj {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .option-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            transition: 0.3s;
        }

        .option-item:hover {
            background-color: #f0f0f0;
        }

        .beer-img {
            width: 80px;
            height: 80px;
            padding: 6px;
            object-fit: contain;
            margin-bottom: 8px;
            border-radius: 12px;
            background-color: #fff;
        }

        .accordion-container {
            margin-top: 20px;
            text-align: left;
        }

        .participant-item {
            background: rgba(255, 255, 255, 0.1);
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            transition: 0.3s;
        }

        .participant-item summary {
            padding: 15px;
            display: flex;
            align-items: center;
            cursor: pointer;
            list-style: none;
            /* Ascunde triunghiul default */
            font-weight: bold;
        }

        /* Chrome/Safari ascundere triunghi */
        .participant-item summary::-webkit-details-marker {
            display: none;
        }

        .participant-item .rank {
            width: 40px;
            color: #e67e22;
        }

        .participant-item .name {
            flex-grow: 1;
        }

        .participant-item .score {
            margin-right: 15px;
            background: rgba(0, 0, 0, 0.2);
            padding: 4px 8px;
            border-radius: 4px;
        }

        .participant-item .arrow {
            font-size: 0.8em;
            transition: 0.3s;
        }

        .participant-item[open] .arrow {
            transform: rotate(180deg);
        }

        .details-content {
            padding: 10px 15px 15px 55px;
            background: rgba(0, 0, 0, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 8px;
            font-size: 0.85em;
        }

        .runda-detaliu {
            padding: 4px 0;
            border-bottom: 1px border rgba(255, 255, 255, 0.05);
        }

        .runda-detaliu strong {
            color: #ddd;
            font-weight: normal;
        }

        .runde {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.15);
            /* Efect Glass */
            backdrop-filter: blur(5px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .runde h4 {
            margin: 0 0 15px 0;
            color: #4CAF50;
            /* Verde pentru "Corect" */
            text-align: center;
            font-size: 1.2em;
            text-transform: uppercase;
        }

        .corecte-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
        }

        .item-corect {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            border-bottom: 2px solid #4CAF50;
        }

        .item-corect strong {
            display: block;
            font-size: 0.7em;
            color: #aaa;
            margin-bottom: 4px;
        }

        .item-corect span {
            font-size: 0.9em;
            font-weight: bold;
            color: #fff;
        }

        .option-item.readonly {
            opacity: 0.6;
            cursor: not-allowed;
            filter: grayscale(0.5);
        }

        .options.locked {
            pointer-events: none;
            /* Previne orice interactiune */
        }

        .runda[style*="rgba(255,0,0,0.3)"] {
            background: rgba(0, 0, 0, 0.2) !important;
        }

        .participant-img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 45px;
            /* Transformă imaginea în cerc */
            border: 3px solid transparent;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        /* Stil când participantul este selectat */
        .option-item input[type="radio"]:checked+.participant-img {
            border-color: #c99f2e;
            transform: scale(1.1);
            box-shadow: 0 0 10px rgba(201, 159, 46, 0.5);
        }

        #participanti-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            padding: 10px;
        }

        .participant-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.8em;
            width: 80px;
            gap:5px;
        }
    </style>
</head>

<body>
    <img class="img-overlay" src="
    img/Background.jpg">
    <div class="content-over" style="display: flex;flex-direction: column;gap:10px;">
        <h2>🍺 Degustare Bere</h2>
        <div id="status-container"></div>
        <div id="mesaj-raspuns"></div>
        <form id="beerForm">
            <div class="card">
                <label>Cine ești?</label>
                <input type="hidden" id="nume" name="entry.1416233126" required>

                <div id="participanti-container">
                    <p>Se încarcă lista...</p>
                </div>

                <input type="hidden" name="entry.1962963261" value="Oare ce bere ii?">
            </div>

            <div id="runde-container">
            </div>

            <button type="submit">Trimite Răspunsurile</button>
        </form>
        <div id="rezultate-container" style="display:none;">
            <h2 id="castigator-text" style="margin: 6px 20px;"></h2>
            <div id="lista-participanti"></div>
            <h3 id="loser-text"
                style="margin-top:20px; font-size: 0.9em; color: #ffffff;padding: 15px;text-align: center;"></h3>
            <div class="runde"></div>
            <button onclick="window.location.href=window.location.pathname">Inapoi la Formular</button>
        </div>
    </div>
    <script>
        const URL_PARTICIPANTI = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRL-Lwu8l5vAo8tDsrQemIbde5RbpqcLQic7WpnKgNbTm-ngb8WvcUOa0bLC_MqMUJifQBTdNzLy-Hs/pub?gid=341374224&single=true&output=csv";
        const URL_CATALOG_BERI = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRL-Lwu8l5vAo8tDsrQemIbde5RbpqcLQic7WpnKgNbTm-ngb8WvcUOa0bLC_MqMUJifQBTdNzLy-Hs/pub?gid=1926189015&single=true&output=csv";
        const URL_CONFIG_RUNDE = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRL-Lwu8l5vAo8tDsrQemIbde5RbpqcLQic7WpnKgNbTm-ngb8WvcUOa0bLC_MqMUJifQBTdNzLy-Hs/pub?gid=1548007609&single=true&output=csv";
        const URL_REZULTATE = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRL-Lwu8l5vAo8tDsrQemIbde5RbpqcLQic7WpnKgNbTm-ngb8WvcUOa0bLC_MqMUJifQBTdNzLy-Hs/pub?gid=0&single=true&output=csv";

        const GOOGLE_FORM_ENTRY_IDS = [
            "entry.798005432", "entry.1274602696", "entry.889790409",
            "entry.244957917", "entry.184797526", "entry.776717580",
            "entry.121399365", "entry.710452339", "entry.1355271358"
        ];

        let ultimaConfiguratieValida = {};
        let rundaMaximaActiva = 0;
        let contorRegresie = 0;
        const LIMITA_REGRESIE = 10;

        async function preiaDateServer(url) {
            const timestamp = Date.now();
            const response = await fetch(`${url}${url.includes('?') ? '&' : '?'}nocache=${timestamp}`);
            return await response.text();
        }

        function randeazaStructuraInitiala() {
            const container = document.getElementById('runde-container');
            if (!container || container.children.length > 0) return;
            let htmlSustragere = "";
            for (let i = 1; i <= 9; i++) {
                htmlSustragere += `
            <div id="wrapper-runda-${i}" class="runda" style="display: none; transition: all 0.3s ease;">
                <label id="label-runda-${i}" style="font-weight:bold;"></label>
                <div id="optiuni-runda-${i}" class="options"></div>
            </div>`;
            }
            container.innerHTML = htmlSustragere;
        }

        async function sincronizareAplicatie() {
            try {
                randeazaStructuraInitiala();
                const urlParams = new URLSearchParams(window.location.search);
                const esteModBattleRoyal = urlParams.get('battleroyal') === 'da';

                const [csvBeri, csvRunde] = await Promise.all([
                    preiaDateServer(URL_CATALOG_BERI),
                    preiaDateServer(URL_CONFIG_RUNDE)
                ]);

                const catalogBeri = csvBeri.split(/\r?\n/).slice(1)
                    .map(row => {
                        const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                        return cols[1] ? cols[1].replace(/"/g, "").trim() : null;
                    }).filter(b => b);

                const randuriRunde = csvRunde.split(/\r?\n/).filter(r => r.trim() !== "");
                let nouaConfiguratie = {};
                let rundaMaxDetectata = 0;

                randuriRunde.slice(1).forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length >= 7) {
                        const idRunda = cols[0].trim();
                        const status = cols[5] ? cols[5].replace(/"/g, "").trim().toLowerCase() : "";
                        nouaConfiguratie[idRunda] = {
                            solutieCorecta: cols[1] ? cols[1].replace(/"/g, "").trim() : "",
                            posibile: cols[3] ? cols[3].replace(/"/g, "").trim() : "Toate",
                            status: status,
                            sePoateEdita: cols[6] ? cols[6].replace(/"/g, "").trim().toLowerCase() === "da" : true
                        };
                        if (status !== "in pregatire" && status !== "") {
                            rundaMaxDetectata = Math.max(rundaMaxDetectata, parseInt(idRunda));
                        }
                    }
                });

                const alertaConflict = document.getElementById('alerta-conflict-cache') || creareElementAlerta();
                if (rundaMaxDetectata < rundaMaximaActiva && contorRegresie < LIMITA_REGRESIE) {
                    contorRegresie++;
                    alertaConflict.innerHTML = `⚠️ Eroare sincronizare (${contorRegresie}/${LIMITA_REGRESIE}): Date învechite detectate. Se păstrează Runda ${rundaMaximaActiva}.`;
                    alertaConflict.style.display = "block";
                    return;
                } else {
                    alertaConflict.style.display = "none";
                    contorRegresie = 0;
                    rundaMaximaActiva = rundaMaxDetectata;
                    ultimaConfiguratieValida = nouaConfiguratie;
                }

                for (let i = 1; i <= 9; i++) {
                    const wrapper = document.getElementById(`wrapper-runda-${i}`);
                    const optionsContainer = document.getElementById(`optiuni-runda-${i}`);
                    const label = document.getElementById(`label-runda-${i}`);
                    const config = ultimaConfiguratieValida[i.toString()];

                    if (!config || config.status === "in pregatire" || config.status === "") {
                        wrapper.style.display = "none";
                        continue;
                    }

                    wrapper.style.display = "block";
                    const esteIncheiata = (config.status === "finalizata" || config.status === "incheiata");
                    const blocatLaEditare = esteIncheiata && !config.sePoateEdita;

                    // Update label și border fără a distruge input-urile
                    const labelNou = `Runda ${i} ${esteIncheiata ? '<span style="color:#ff4444;">(Încheiată)</span>' : '<span style="color:#4CAF50;">(Activă)</span>'}`;
                    if (label.innerHTML !== labelNou) label.innerHTML = labelNou;
                    wrapper.style.borderColor = esteIncheiata ? 'rgba(255,0,0,0.3)' : 'rgba(0,255,0,0.3)';

                    let beriDeAfisat = (esteModBattleRoyal && config.posibile !== "Toate")
                        ? catalogBeri.filter(b => config.posibile.toLowerCase().split(',').map(x => x.trim()).includes(b.toLowerCase()))
                        : [...catalogBeri];

                    // --- LOGICA DE UPDATE SMART ---
                    // Generăm amprenta listei de beri (numele lor concatenate)
                    const amprentaNoua = beriDeAfisat.join('|');
                    const amprentaVeche = optionsContainer.getAttribute('data-amprenta');

                    if (amprentaNoua !== amprentaVeche) {
                        // Doar dacă lista de beri s-a schimbat efectiv (Battle Royal update), refacem HTML-ul
                        let htmlOptiuni = "";
                        beriDeAfisat.forEach(nume => {
                            htmlOptiuni += `
                            <label class="option-item">
                                <img src="img/${nume}.jpg" class="beer-img" alt="${nume}" onerror="this.style.visibility='hidden';">
                                <div class="radio-wrapper">
                                    <input type="radio" name="${GOOGLE_FORM_ENTRY_IDS[i - 1]}" value="${nume}" required>
                                    <span>${nume}</span>
                                </div>
                            </label>`;
                        });
                        optionsContainer.innerHTML = htmlOptiuni;
                        optionsContainer.setAttribute('data-amprenta', amprentaNoua);
                    }

                    // Update stare blocat/deblocat (fără a șterge elementele)
                    const inputs = optionsContainer.querySelectorAll('input');
                    inputs.forEach(inp => {
                        inp.disabled = blocatLaEditare;
                        const parentLabel = inp.closest('.option-item');
                        if (blocatLaEditare) parentLabel.classList.add('readonly');
                        else parentLabel.classList.remove('readonly');
                    });

                    blocatLaEditare ? optionsContainer.classList.add('locked') : optionsContainer.classList.remove('locked');
                }
            } catch (e) { console.error("Sync Error:", e); }
        }
        async function afisareClasament() {
            try {
                const dataRezultate = await preiaDateServer(URL_REZULTATE);
                const rows = dataRezultate.split(/\r?\n/).filter(r => r.trim() !== "");
                const header = rows[0].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

                let participanti = rows.slice(1).map(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    let runde = [];
                    for (let i = 3; i <= 11; i++) {
                        if (cols[i]) runde.push({ t: header[i].replace(/"/g, ""), b: cols[i].replace(/"/g, "") });
                    }
                    return {
                        nume: (cols[1] || "Anonim").replace(/"/g, "").trim(),
                        scor: parseInt(cols[2]) || 0,
                        runde: runde
                    };
                }).filter(p => p.nume !== "");

                participanti.sort((a, b) => b.scor - a.scor);

                if (participanti.length > 0) {
                    const maxS = participanti[0].scor;
                    const minS = participanti[participanti.length - 1].scor;

                    const castigatoriList = participanti.filter(p => p.scor === maxS);
                    const pierzatoriList = participanti.filter(p => p.scor === minS);

                    // Logica plural castigatori
                    const txtCastig = castigatoriList.map(p => p.nume).join(", ");
                    document.getElementById('castigator-text').innerText = "🏆 " + txtCastig + (castigatoriList.length > 1 ? " au câștigat! Trebuie un duel să vedem care câștigă!" : " a câștigat!");

                    // Logica plural pierzatori
                    const txtPierd = pierzatoriList.map(p => p.nume).join(", ");
                    document.getElementById('loser-text').innerText = "🤌 " + txtPierd + (pierzatoriList.length > 1 ? " treceți pe vin. Trebuie un duel să vedem care e cel mai slab bețiv! Pierzătorul suprem trebuie tatuat cu tatuaje pușcate." : ", treci pe vin. Pierzătorul suprem trebuie tatuat cu tatuaje pușcate.");

                    let htmlAcc = "<div class='accordion-container'>";
                    participanti.forEach((p, idx) => {
                        let det = p.runde.map(r => `<div class="runda-detaliu"><strong>${r.t}:</strong> <span>${r.b}</span></div>`).join("");
                        htmlAcc += `<details class="participant-item"><summary><span class="rank">#${idx + 1}</span> ${p.nume} - ${p.scor} pct</summary><div class="details-content">${det}</div></details>`;
                    });
                    document.getElementById('lista-participanti').innerHTML = htmlAcc + "</div>";
                }

                // Sectiunea Solutii Corecte
                const containerSolutii = document.querySelector('#rezultate-container .runde');
                if (containerSolutii) {
                    let htmlSol = `<h4>✅ Soluții Corecte</h4><div class="corecte-grid">`;
                    let rundaGasita = false;
                    Object.keys(ultimaConfiguratieValida).forEach(id => {
                        const c = ultimaConfiguratieValida[id];
                        if (c.status === "finalizata" || c.status === "incheiata") {
                            htmlSol += `<div class="item-corect"><strong>Runda ${id}:</strong> <span>${c.solutieCorecta}</span></div>`;
                            rundaGasita = true;
                        }
                    });
                    containerSolutii.innerHTML = rundaGasita ? htmlSol + `</div>` : "";
                }

                document.getElementById('beerForm').style.display = 'none';
                document.getElementById('rezultate-container').style.display = 'block';
            } catch (e) { console.error(e); }
        }

        function creareElementAlerta() {
            const alerta = document.createElement('div');
            alerta.id = 'alerta-conflict-cache';
            alerta.style = "background: #fff3cd; color: #856404; padding: 10px; border-radius: 5px; margin: 10px 0; border: 1px solid #ffeeba; display: none; font-size: 0.9em; text-align: center;";
            const f = document.getElementById('beerForm');
            f.insertBefore(alerta, f.querySelector('button[type="submit"]'));
            return alerta;
        }

        document.getElementById('beerForm').onsubmit = async function (e) {
            e.preventDefault();
            const b = this.querySelector('button');
            b.disabled = true; b.innerText = "Se trimite...";
            const d = new URLSearchParams(new FormData(this)).toString();
            try {
                await fetch(`https://docs.google.com/forms/d/e/1FAIpQLSfNpdMrozAKyA69WYd2Q_Fc4ftBzLsmru5jrb8bTaunEBO5LQ/formResponse?${d}`, { method: 'POST', mode: 'no-cors' });
                document.getElementById('mesaj-raspuns').innerHTML = `<div class="formular-raspuns succes"><p>Ai fost înscris cu succes! 🍻</p></div><button onclick="window.location.href='?afiseaza_rezultate=da'" style="background:#c99f2e; margin-top:10px;">Vezi rezultate</button>`;
                this.style.display = 'none';
            } catch (err) { b.disabled = false; b.innerText = "Eroare. Reîncearcă"; }
        };
        async function incarcaParticipanti() {
            try {
                const csvData = await preiaDateServer(URL_PARTICIPANTI);
                const linii = csvData.split(/\r?\n/).slice(1); // Ignorăm header-ul
                const container = document.getElementById('participanti-container');
                const inputAscuns = document.getElementById('nume');

                let html = "";
                linii.forEach(linie => {
                    const nume = linie.trim().replace(/"/g, "");
                    if (!nume) return;

                    html += `
            <label class="option-item participant-label">
                <input type="radio" name="temp_nume" value="${nume}" 
                       style="display:none;" 
                       onchange="document.getElementById('nume').value=this.value" required>
                <img src="img/${nume}.jpg" class="participant-img" alt="${nume}" 
                     onerror="this.src='img/Persoana.jpg';">
                <span>${nume}</span>
            </label>`;
                });

                container.innerHTML = html || "<p>Niciun participant găsit.</p>";
            } catch (e) {
                console.error("Eroare la încărcarea participanților:", e);
                document.getElementById('participanti-container').innerHTML = "<p>Eroare la încărcare.</p>";
            }
        }
        window.onload = () => {
            const p = new URLSearchParams(window.location.search);
            const res = p.get('afiseaza_rezultate') === 'da';

            if (!res) incarcaParticipanti();

            const bucla = async () => {
                await sincronizareAplicatie();
                if (res) afisareClasament();
            };
            bucla();
            setInterval(bucla, 20000);
        };
    </script>
</body>

</html>
